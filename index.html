<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bebo Translate | Professional Multi-Language Translator</title>
    <meta name="description"
        content="Professional real-time voice translator supporting English, Finnish, Spanish, Chinese, Urdu, Nepali, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="app-container">
        <header>
            <div class="logo">
                <img src="logo.png" alt="Bebo Translator Logo" class="logo-img">
                <h1>Bebo<span>Translate</span></h1>
            </div>
            <div class="language-selection">
                <div class="select-group">
                    <label for="source-lang-select">From:</label>
                    <select id="source-lang-select">
                        <option value="en-US">English</option>
                        <option value="fi-FI">Finnish</option>
                        <option value="es-ES">Spanish</option>
                        <option value="zh-CN">Chinese (Simplified)</option>
                        <option value="ur-PK">Urdu</option>
                        <option value="ne-NP">Nepali</option>
                        <option value="fr-FR">French</option>
                        <option value="de-DE">German</option>
                        <option value="it-IT">Italian</option>
                    </select>
                </div>
                <button id="swap-languages" class="btn-icon" title="Swap Languages">⇄</button>
                <div class="select-group">
                    <label for="target-lang-select">To:</label>
                    <select id="target-lang-select">
                        <option value="fi-FI">Finnish</option>
                        <option value="en-US" selected>English</option>
                        <option value="es-ES">Spanish</option>
                        <option value="zh-CN">Chinese (Simplified)</option>
                        <option value="ur-PK">Urdu</option>
                        <option value="ne-NP">Nepali</option>
                        <option value="fr-FR">French</option>
                        <option value="de-DE">German</option>
                        <option value="it-IT">Italian</option>
                    </select>
                </div>
                <div class="toggle-group">
                    <label class="switch">
                        <input type="checkbox" id="tts-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                    <span class="toggle-label">Speak Result (TTS)</span>
                </div>
            </div>
        </header>

        <section class="live-feed-section">
            <div class="video-container">
                <video id="webcam" autoplay playsinline muted></video>
                <div class="video-overlay">
                    <div class="rec-dot"></div>
                    <span>LIVE FEED</span>
                </div>
            </div>
        </section>

        <section class="translation-area">
            <div class="card source-card">
                <div class="card-header">
                    <span class="status-indicator" id="voice-indicator">
                        <span class="dot"></span>
                        <span class="status-text">Ready</span>
                    </span>
                </div>
                <div class="text-content">
                    <textarea id="source-text" placeholder="Click 'Start Listening' and speak..."></textarea>
                </div>
            </div>

            <div class="card target-card">
                <div class="card-header">
                    <span class="translation-label">Translation</span>
                </div>
                <div class="text-content">
                    <textarea id="target-text" placeholder="Translation will appear here..." readonly></textarea>
                </div>
            </div>
        </section>

        <footer>
            <button id="start-btn" class="btn-primary">
                <span class="icon">🎤</span>
                <span class="btn-text">Start Listening</span>
            </button>
            <p class="hint">Microphone access is required for voice translation.</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>

</html>
